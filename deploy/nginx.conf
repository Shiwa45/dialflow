# nginx.conf — DialFlow Pro
# Reverse proxy for Daphne (ASGI) with WebSocket support.
# Place in /etc/nginx/sites-available/dialflow and symlink to sites-enabled.

upstream dialflow_asgi {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name your-domain.com;          # <-- update

    # Redirect HTTP → HTTPS in production
    # return 301 https://$host$request_uri;

    # Static files — served directly by nginx (fast)
    location /static/ {
        alias /srv/dialflow/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /srv/dialflow/media/;
        # Protect recordings — only serve if authenticated (use X-Accel-Redirect in Django view)
    }

    # WebSocket upgrade
    location /ws/ {
        proxy_pass         http://dialflow_asgi;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400;          # Keep WS alive (24h)
        proxy_send_timeout 86400;
    }

    # All other requests
    location / {
        proxy_pass         http://dialflow_asgi;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }
}
