[tool:pytest]
DJANGO_SETTINGS_MODULE = dialflow.settings.test
python_files = tests/test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[flake8]
max-line-length = 110
exclude = migrations, __pycache__, .git, venv, env
ignore = E501, W503, E203

[isort]
profile = django
known_django = django
known_first_party = core, users, telephony, campaigns, leads, agents, calls, reports
sections = FUTURE, STDLIB, DJANGO, THIRDPARTY, FIRSTPARTY, LOCALFOLDER
