<!-- leads/list_dnc_patch.html -->
<!-- ADD this column to the leads table in templates/leads/list.html -->
<!-- 
In the <thead> row, add before the last <th></th>:
  <th>DNC</th>

In the <tbody> loop, add before the last <td> with the eye button:
-->

<td>
  <button class="btn btn-ghost btn-sm btn-icon {% if lead.do_not_call %}text-danger{% endif %}"
          onclick="toggleDNC({{ lead.pk }}, {{ lead.do_not_call|yesno:'true,false' }}, this)"
          title="{% if lead.do_not_call %}Remove from DNC{% else %}Add to DNC{% endif %}">
    <i class="fa-solid {% if lead.do_not_call %}fa-ban{% else %}fa-shield-halved{% endif %}"></i>
  </button>
</td>

<!--
And add this JS at the bottom of the template (inside {% block extra_js %}):
-->

<script>
function toggleDNC(leadId, isDnc, btn) {
  const action = isDnc ? 'remove from' : 'add to';
  if (!confirm(`Are you sure you want to ${action} DNC?`)) return;

  const fd = new FormData();
  fd.append('csrfmiddlewaretoken', '{{ csrf_token }}');

  fetch(`/leads/api/${leadId}/toggle-dnc/`, { method: 'POST', body: fd })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        location.reload();
      } else {
        alert(data.error || 'Error toggling DNC');
      }
    });
}
</script>

<!--
Also in leads/detail.html, add a DNC toggle button in the lead info section:
Add after the lead status badge area:
-->

<div style="margin-top:12px">
  {% if lead.do_not_call %}
  <form method="post" action="{% url 'leads:toggle_dnc' lead.pk %}" style="display:inline">
    {% csrf_token %}
    <button type="submit" class="btn btn-secondary btn-sm" onclick="return confirm('Remove from DNC?')">
      <i class="fa-solid fa-shield-halved"></i> Remove from DNC
    </button>
  </form>
  {% else %}
  <form method="post" action="{% url 'leads:toggle_dnc' lead.pk %}" style="display:inline">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Add to DNC list?')">
      <i class="fa-solid fa-ban"></i> Add to DNC
    </button>
  </form>
  {% endif %}
</div>
