; res_odbc.conf — DialFlow Pro
; Configure ODBC connection to PostgreSQL.
; Requires: unixODBC + psqlodbc installed on the Asterisk server.
;
; Install:
;   sudo apt install unixodbc odbc-postgresql
;   Then configure /etc/odbcinst.ini and /etc/odbc.ini (see below)

[dialflow]
enabled       => yes
dsn           => dialflow_db       ; matches [dialflow_db] in /etc/odbc.ini
username      => postgres          ; <-- your DB user
password      => Shiwansh@123      ; <-- your DB password
pre-connect   => yes
max_connections => 10

; ── /etc/odbc.ini (add this section) ────────────────────────────────────────
; [dialflow_db]
; Driver    = PostgreSQL Unicode
; Database  = dialflow_db
; Servername= 127.0.0.1
; Port      = 5432
; Protocol  = 7.4
;
; ── /etc/odbcinst.ini (add this section) ────────────────────────────────────
; [PostgreSQL Unicode]
; Description = PostgreSQL ODBC driver (Unicode version)
; Driver      = /usr/lib/x86_64-linux-gnu/odbc/psqlodbcw.so
; Setup       = /usr/lib/x86_64-linux-gnu/odbc/libodbcpsqlS.so
; Debug       = 0
; CommLog     = 0
;
; Test with:
;   isql -v dialflow_db dialflow_user dialflow_pass
