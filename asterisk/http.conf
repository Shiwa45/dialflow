; http.conf — DialFlow Pro
; Asterisk built-in HTTP server — required for ARI REST and WebSocket (JsSIP).

[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088            ; HTTP (ws:// for dev JsSIP)
; tlsenable=yes          ; Uncomment for WSS in production
; tlsbindport=8089
; tlscertfile=/etc/asterisk/keys/asterisk.crt
; tlsprivatekey=/etc/asterisk/keys/asterisk.key
