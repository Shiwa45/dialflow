; http.conf — DialFlow Pro
; Asterisk built-in HTTP server — required for ARI REST and WebSocket (JsSIP).

[general]
enabled=yes
bindaddr=0.0.0.0
bindport=8088            ; HTTP (ws:// for dev JsSIP)
tlsenable=yes
tlsbindport=8089
tlscertfile=/etc/asterisk/keys/cert.pem
tlsprivatekey=/etc/asterisk/keys/key.pem
