; extconfig.conf — DialFlow Pro
; Tells Asterisk to read PJSIP objects from the database instead of config files.
; Paste this content into /etc/asterisk/extconfig.conf on your Asterisk server.

[settings]
; PJSIP realtime — Asterisk reads extensions from dialflow_db.ps_endpoints etc.
ps_endpoints   => odbc,dialflow,ps_endpoints
ps_auths       => odbc,dialflow,ps_auths
ps_aors        => odbc,dialflow,ps_aors
ps_contacts    => odbc,dialflow,ps_contacts
