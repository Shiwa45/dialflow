; extensions.conf — DialFlow Pro
; Minimal dialplan. Most logic is in Asterisk ARI (Python).
; Agents register via PJSIP realtime. Outbound calls go through the Stasis app.

[general]
static=yes
writeprotect=no

; ── Agent context ─────────────────────────────────────────────────────────────
[agents]
; Agents' phones register in this context.
; Calls arrive via ARI bridge — no dialplan needed for inbound.
exten => _X.,1,Answer()
exten => _X.,n,Stasis(dialflow,agent_leg)
exten => _X.,n,Hangup()

; ── Outbound through ARI ─────────────────────────────────────────────────────
; All outbound calls are originated by ARI with app=dialflow.
; They land in Stasis before the customer answers.
[default]
exten => _X.,1,Stasis(dialflow)
exten => _X.,n,Hangup()

; ── Inbound from carrier ─────────────────────────────────────────────────────
[from-carrier]
exten => _X.,1,NoOp(Inbound from carrier: ${CALLERID(all)})
 same => n,Stasis(dialflow,inbound)
 same => n,Hangup()

; ── Dialout context (used by PJSIP trunks) ───────────────────────────────────
[dialout]
exten => _X.,1,Stasis(dialflow,autodial)
exten => _X.,n,Hangup()

; ── Include auto-generated carrier dialplans ─────────────────────────────────
#include carriers_dialplan.conf
