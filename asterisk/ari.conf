; ari.conf — DialFlow Pro
; Enable Asterisk REST Interface (ARI) for the dialflow application.

[general]
enabled=yes
pretty=no
allowed_origins=*        ; Tighten in production: allowed_origins=http://your-django-host

[asterisk]
type=user
password=asterisk        ; Change this — must match ARI_PASSWORD in .env
read_only=no
