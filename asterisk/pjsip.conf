; pjsip.conf — DialFlow Pro
; Transports only. Endpoints/auths/aors are in the DB (PJSIP realtime).

[global]
type=global
endpoint_identifier_order=ip,username,anonymous

; UDP transport (for SIP hard phones / carriers)
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=YOUR_SERVER_IP   ; <-- replace with your public IP
external_signaling_address=YOUR_SERVER_IP

; TCP transport
[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; WSS transport (for WebRTC browser clients — JsSIP)
[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
; TLS cert required for WSS (wss:// requires HTTPS cert)
; cert_file=/etc/asterisk/keys/asterisk.crt
; priv_key_file=/etc/asterisk/keys/asterisk.key

; WS transport (for dev — use ws:// in JsSIP WS_URL)
[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088
