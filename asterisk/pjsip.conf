; pjsip.conf — DialFlow Pro
; Transports only. Endpoints/auths/aors are in the DB (PJSIP realtime).

[global]
type=global
endpoint_identifier_order=ip,username,anonymous
; NAT: tell PJSIP this is the local WSL2 subnet behind Windows LAN IP
; Asterisk will rewrite SIP headers to show 192.168.1.13 (Windows LAN IP)
; so that LAN devices (GSM gateways etc.) can route replies back correctly
local_net=172.16.0.0/12
local_net=10.0.0.0/8
; LAN subnet — agents on the same LAN use WSL2 IP directly for ICE
; (no port-forwarding needed for RTP when browser and Asterisk are on same host)
local_net=192.168.1.0/24
external_media_address=192.168.1.13
external_signaling_address=192.168.1.13
; DTLS: path where Asterisk stores auto-generated DTLS certificates
; Required when dtls_auto_generate_cert=yes is set on WebRTC endpoints
dtls_cert_dir=/etc/asterisk/keys

; UDP transport (for SIP hard phones / carriers)
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=192.168.1.13
external_signaling_address=192.168.1.13

; TCP transport
[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

; WSS transport (for WebRTC browser clients — JsSIP)
[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0:8089
; TLS cert required for WSS (wss:// requires HTTPS cert)
cert_file=/etc/asterisk/keys/cert.pem
priv_key_file=/etc/asterisk/keys/key.pem

; WS transport (for dev — use ws:// in JsSIP WS_URL)
[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088
