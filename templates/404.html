<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — DialFlow Pro</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
            background:var(--color-bg);padding:24px;text-align:center">
  <div>
    <div style="font-size:80px;color:var(--color-border-md);font-weight:600;line-height:1">404</div>
    <div style="font-size:20px;font-weight:600;color:var(--color-text-1);margin:12px 0 6px">
      Page not found
    </div>
    <div style="font-size:14px;color:var(--color-text-3);margin-bottom:24px">
      The page you requested doesn't exist or you don't have permission to view it.
    </div>
    <a href="/" style="display:inline-flex;align-items:center;gap:6px;padding:8px 18px;
                        background:var(--color-accent);color:#fff;border-radius:var(--radius-md);
                        font-size:14px;font-weight:500;text-decoration:none">
      ← Go home
    </a>
  </div>
</div>
</body>
</html>
